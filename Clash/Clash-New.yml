# ========================
# Clash-HGC 优化配置
# ========================

# -----------------------------------------------------------------------------
# 策略组 (Proxy Groups)
# 这些策略组将使用您 OpenClash 订阅转换后获取的代理节点。
# 请确保这些策略组能够引用到实际的代理节点或机场生成的默认代理组！
# 在这里的 proxies 列表中，建议确保有一个能引用到机场代理的选项，例如 'PROXY'（常见的机场默认代理组名）
# -----------------------------------------------------------------------------

proxy-groups:
  # 策略组默认锚点定义
  default: &default-proxy-group
    type: select
    tolerance: 50
    hidden: false
    lazy: false
    disguise: false
    disable-udp: false
    url: http://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    max-history: 10

  # AI 智能相关
  - &ai-group
    <<: *default-proxy-group
    name: AI
    proxies:
      - 直连
      # 可以考虑加入机场默认的代理选择组，例如：- PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Sex 内容
  - &sex-group
    <<: *default-proxy-group
    name: Sex
    proxies:
      - 直连
      # - PROXY
      - 美国-故转
      - 其他-故转
      - 拒绝

  # Test 测试组
  - &test-group
    <<: *default-proxy-group
    name: Test
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Youtube
  - &youtube-group
    <<: *default-proxy-group
    name: Youtube
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Google
  - &google-group
    <<: *default-proxy-group
    name: Google
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Microsoft
  - &microsoft-group
    <<: *default-proxy-group
    name: Microsoft
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Apple
  - &apple-group
    <<: *default-proxy-group
    name: Apple
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Crypto 加密货币
  - &crypto-group
    <<: *default-proxy-group
    name: Crypto
    proxies:
      # - PROXY
      - 新加坡-故转
      - 美国-故转
      - 香港-故转
      - 拒绝

  # Stream Media 流媒体
  - &stream-media-group
    <<: *default-proxy-group
    name: Stream_Media
    proxies:
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Games 游戏
  - &games-group
    <<: *default-proxy-group
    name: Games
    proxies:
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Nvidia
  - &nvidia-group
    <<: *default-proxy-group
    name: Nvidia
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # Adobe
  - &adobe-group
    <<: *default-proxy-group
    name: Adobe
    proxies:
      - 直连
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # 国外流量
  - &foreign-group
    <<: *default-proxy-group
    name: 国外
    proxies:
      # - PROXY
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 其他-故转
      - 拒绝

  # 国内流量
  - &domestic-group
    <<: *default-proxy-group
    name: 国内
    proxies:
      - 直连
      - 拒绝

  # 拒绝
  - &reject-group
    <<: *default-proxy-group
    name: 拒绝
    type: reject

  # 直连
  - &direct-group
    <<: *default-proxy-group
    name: 直连
    type: direct

  # 其他（默认策略）
  - &other-group
    <<: *default-proxy-group
    name: 其他
    type: select
    proxies:
      # - PROXY # 可以考虑在这里加入机场默认的代理选择组
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 直连
      - 拒绝

  # 以下是您定义的地域选择组，它们需要实际的节点作为候选项
  # 请注意：这里的 proxies 列表需要由您在 OpenClash 的订阅转换中进行处理，
  # 以引用到机场订阅中具体节点名称或通过 filter 筛选。
  - &hk-group
    <<: *default-proxy-group
    name: 香港-故转
    type: select
    proxies: [] # 初始为空，待合并后由 OpenClash 自动填充或在此处手动填写具体节点名

  - &tw-group
    <<: *default-proxy-group
    name: 台湾-故转
    type: select
    proxies: []

  - &sg-group
    <<: *default-proxy-group
    name: 新加坡-故转
    type: select
    proxies: []

  - &jp-group
    <<: *default-proxy-group
    name: 日本-故转
    type: select
    proxies: []

  - &us-group
    <<: *default-proxy-group
    name: 美国-故转
    type: select
    proxies: []

  - &other-regions-group
    <<: *default-proxy-group
    name: 其他-故转
    type: select
    proxies: []

# -----------------------------------------------------------------------------
# 规则锚点 (Rule Anchors)
# -----------------------------------------------------------------------------

rule-anchor:
  ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: {type: http, interval: 86400, behavior: domain, format: mrs}
  class: {type: http, interval: 86400, behavior: classical, format: text}

